<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9ff;
            color: #333;
        }

        /* ── Navbar ── */
        .navbar {
            background: #fff;
            box-shadow: 0 2px 10px rgba(108, 99, 255, 0.1);
            padding: 16px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 18px;
            color: #6c63ff !important;
        }

        .navbar-nav .nav-link {
            color: #555 !important;
            font-weight: 500;
            font-size: 13px;
            margin-left: 30px;
            transition: 0.2s;
        }

        .navbar-nav .nav-link:hover {
            color: #6c63ff !important;
        }

        .logout-btn {
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            margin-left: 20px;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .logout-btn:hover {
            background: #000;
            color: #fff;
        }

        /* ── Hero Section ── */
        .hero-section {
            background: linear-gradient(135deg, #6c63ff 0%, #a89cff 100%);
            color: #fff;
            padding: 80px 40px;
            text-align: center;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
        }

        .avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 5px solid rgba(255,255,255,0.3);
            object-fit: cover;
            position: relative;
            z-index: 2;
            display: block;
        }

        .avatar-edit-btn-large {
            position: absolute;
            bottom: 280px;
            right: calc(50% - 70px);
            width: 40px;
            height: 40px;
            background: #fff;
            border: 3px solid #6c63ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            z-index: 3;
        }

        #avatarInputLarge { display: none; }

        .hero-title {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
        }

        .hero-status {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
            position: relative;
            z-index: 2;
        }

        /* ── Content Section ── */
        .content-wrapper {
            padding: 60px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #222;
        }

        /* ── Profile Info Grid ── */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .info-item {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            border: 1.5px solid #ebe9ff;
            transition: 0.3s;
        }

        .info-item:hover {
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.1);
            border-color: #6c63ff;
        }

        .info-label {
            font-size: 11px;
            font-weight: 700;
            color: #6c63ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            word-break: break-word;
        }

        /* ── Action Buttons ── */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 50px;
        }

        .edit-btn {
            background: #6c63ff;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #000;
        }

        /* ── Edit Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-box h3 {
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 8px;
            color: #222;
        }

        .modal-box p {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }

        .modal-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .modal-row.full {
            grid-template-columns: 1fr;
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }

        .modal-input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }

        .modal-input[disabled] {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        #modalMsg {
            font-size: 12px;
            text-align: left;
            margin: 12px 0;
            min-height: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-save {
            flex: 1;
            padding: 12px 20px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .btn-save:hover { background: #000; }

        .btn-cancel {
            flex: 1;
            padding: 12px 20px;
            background: #f0f0f0;
            color: #555;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: 0.2s;
        }

        .btn-cancel:hover { background: #e0e0e0; }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 9999;
        }

        .toast-msg.show { opacity: 1; }

        @media (max-width: 768px) {
            .hero-section { padding: 50px 20px; }
            .hero-title { font-size: 28px; }
            .content-wrapper { padding: 40px 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .navbar { padding: 12px 20px; }
            .navbar-nav .nav-link { margin-left: 20px; font-size: 12px; }
            .action-buttons { flex-direction: column; }
            .modal-box { padding: 30px 20px; }
            .modal-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand">Dashboard</span>
            <div style="margin-left: auto; display: flex; align-items: center;">
                <ul class="navbar-nav" style="flex-direction: row;">
                    <li class="nav-item">
                        <a class="nav-link" href="#profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#settings">Settings</a>
                    </li>
                </ul>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section" id="profile">
        <label class="avatar-edit-btn-large" for="avatarInputLarge" title="Change photo">📷</label>
        <input type="file" id="avatarInputLarge" accept="image/*">
        
        <img id="avatarImg" class="avatar-large" src="" alt="Profile">
        <h1 class="hero-title" id="heroName">Welcome!</h1>
        <p class="hero-subtitle" id="heroUsername">@user</p>
        <div class="hero-status">✅ Account Active</div>
    </section>

    <!-- Content Section -->
    <div class="content-wrapper" id="settings">
        <h2 class="section-title">Profile Information</h2>

        <div class="info-grid">
            <div class="info-item">
                <label class="info-label">First Name</label>
                <span class="info-value" id="infoFirstName">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Last Name</label>
                <span class="info-value" id="infoLastName">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Username</label>
                <span class="info-value" id="infoUsername">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Email Address</label>
                <span class="info-value" id="infoEmail">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Member Since</label>
                <span class="info-value" id="infoJoined">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Account Status</label>
                <span class="info-value" style="color: #28a745;">✅ Active</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="edit-btn" id="openEditBtn">✏️ Edit Profile</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <h3>Edit Your Profile</h3>
            <p>Update your profile information below</p>

            <div class="modal-row">
                <input type="text" id="editFirstName" class="modal-input" placeholder="First Name">
                <input type="text" id="editLastName" class="modal-input" placeholder="Last Name">
            </div>

            <div class="modal-row full">
                <input type="text" id="editUsername" class="modal-input" placeholder="Username">
            </div>

            <div class="modal-row full">
                <input type="email" id="editEmail" class="modal-input" placeholder="Email" disabled title="Email cannot be changed here">
            </div>

            <p id="modalMsg"></p>

            <div class="modal-actions">
                <button class="btn-cancel" id="closeEditBtn">Cancel</button>
                <button class="btn-save" id="saveEditBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-msg" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/dashboard.js"></script>
</body>
</html>
