<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- External CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">

    <!-- Favicon -->
    <link rel="icon" type="Image/x-icon" href="./assets/images/favicon.ico">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand">Dashboard</span>
            <div style="margin-left: auto; display: flex; align-items: center;">
                <ul class="navbar-nav" style="flex-direction: row;">
                    <li class="nav-item">
                        <a class="nav-link" href="#profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#settings">Settings</a>
                    </li>
                </ul>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Hero-Section -->

    <section class="hero-section" id="profile">
        <div class="avatar-wrapper">
            <img id="avatarImg" class="avatar-large" src="https://dummyimage.com/360x360/e0e0e0/707070.png&text=360x360"
                alt="Profile">

            <label class="avatar-edit-btn-large" for="avatarInputLarge" title="Change photo">
                <i class="fa-solid fa-pencil" style="color: #000; z-index: 9999; position: relative;"></i>
            </label>
            <input type="file" id="avatarInputLarge" accept="image/*">
        </div>

        <h1 class="hero-title" id="heroName">Welcome!</h1>
        <p class="hero-subtitle" id="heroUsername">@user</p>
        <div class="hero-status">✅ Account Active</div>
    </section>

    <div class="content-wrapper" id="settings">

        <div class="section-header">
            <h2 class="section-title">Profile Information</h2>
            <button class="edit-btn" id="openEditBtn"><i class="fa-solid fa-pen"></i> Edit Profile</button>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <label class="info-label">First Name</label>
                <span class="info-value" id="infoFirstName">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Last Name</label>
                <span class="info-value" id="infoLastName">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Username</label>
                <span class="info-value" id="infoUsername">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Email Address</label>
                <span class="info-value" id="infoEmail">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Member Since</label>
                <span class="info-value" id="infoJoined">—</span>
            </div>
            <div class="info-item">
                <label class="info-label">Account Status</label>
                <span class="info-value" style="color: #28a745;">✅ Active</span>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <h3>Edit Your Profile</h3>
            <p>Update your profile information below</p>

            <div class="modal-row">
                <input type="text" id="editFirstName" class="modal-input" placeholder="First Name">
                <input type="text" id="editLastName" class="modal-input" placeholder="Last Name">
            </div>

            <div class="modal-row full">
                <input type="text" id="editUsername" class="modal-input" placeholder="Username">
            </div>

            <div class="modal-row full">
                <input type="email" id="editEmail" class="modal-input" placeholder="Email" disabled
                    title="Email cannot be changed here">
            </div>

            <p id="modalMsg"></p>

            <div class="modal-actions">
                <button class="btn-cancel" id="closeEditBtn">Cancel</button>
                <button class="btn-save" id="saveEditBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <div class="toast-msg" id="toast"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- External JS -->
    <script type="module" src="./assets/js/dashboard.js"></script>
</body>

</html>
