<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- External CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container-fluid cuz-container">
        <div class="main">

            <!-- Reset Password Form -->
            <div class="form">
                <div class="login-form">
                    <!-- shown when oobCode is missing/expired -->
                    <div id="invalidBlock" style="display:none;">
                        <h2>⚠️ Invalid Link</h2>
                        <p style="font-size:14px; color:red; text-align:center;">
                            This reset link is invalid or has expired.<br>
                            Please request a new one.
                        </p>
                        <a href="forgot-password.html" class="btn cuz-btn" style="display:block; text-align:center;">
                            Request New Link
                        </a>
                    </div>

                    <!-- shown when oobCode is valid -->
                    <form id="resetForm" style="display:none;">
                        <h2>Set New Password</h2>
                        <p style="font-size:13px; color:#666; text-align:center; margin-bottom:16px;">
                            Enter your new password below.
                        </p>
                        <input id="password" type="password" class="form-input" placeholder="New Password" required>
                        <input id="confirmPassword" type="password" class="form-input" placeholder="Confirm Password"
                            required>

                        <!-- Password strength bar (powered by script.js) -->
                        <div class="strength-bar">
                            <div id="strengthFill"></div>
                        </div>
                        <p id="strengthText"></p>
                        <p id="msg" style="font-size:14px; margin-top:8px;"></p>
                        <button type="submit" class="btn cuz-btn">Update Password</button>

                        <div class="register-link" style="margin-top:12px;">
                            <a href="login.html">← Back to Login</a>
                        </div>
                    </form>

                    <!-- Loading state while verifying oobCode -->
                    <div id="loadingBlock">
                        <p style="text-align:center; color:#666; font-size:14px;">
                            Verifying reset link...
                        </p>
                    </div>

                </div>
            </div>

            <!-- Carousel -->
            <div class="slider">
                <div id="imageSlider" class="carousel slide h-100" data-bs-ride="carousel" data-bs-interval="3000">
                    <div class="carousel-inner">
                        <div class="carousel-item active h-100">
                            <img src="./assets/images/image-1.jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-2jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-3.jpg" alt="Placeholder Image">
                        </div>
                    </div>
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="0"
                            class="active"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="2"></button>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- script.js for password strength -->
    <script src="./assets/js/script.js"></script>
    <script type="module" src="./assets/js/reset-password.js"></script>
</body>

</html>
