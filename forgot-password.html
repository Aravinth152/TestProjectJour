<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Forgot Password Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- External CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="container-fluid cuz-container">
        <div class="main">
            <!-- Forgot Form -->
            <form class="form" id="forgotForm">
                <div class="login-form">

                    <!-- ── STEP 1: Enter email ── -->
                    <div id="step1">
                        <h2>Forgot Password?</h2>
                        <p style="font-size:14px; color:#666; margin-bottom:18px; text-align:center;">
                            Enter your registered email and we'll show your reset options.
                        </p>
                        <input id="fpEmail" type="email" class="form-input" placeholder="Email Address" required>
                        <p id="step1Msg" class="msg"></p>

                        <button type="submit" class="btn cuz-btn">
                            Continue
                        </button>
                        <div class="register-link">
                            Remembered it?
                            <a href="login.html">Back to Login</a>
                        </div>
                    </div>
                </div>
            </form>
            <p id="message"></p>

            <!-- Carousel -->
            <div class="slider">
                <div id="imageSlider" class="carousel slide h-100" data-bs-ride="carousel" data-bs-interval="3000">
                    <div class="carousel-inner">
                        <div class="carousel-item active h-100">
                            <img src="./assets/images/image-1.jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-2.jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-3.jpg" alt="Placeholder Image">
                        </div>
                    </div>
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="0"
                            class="active"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="2"></button>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<!-- External JS -->
<script src="./assets/js/script.js"></script>
<script type="module" src="./assets/js/forgot-password.js"></script>

</html>
