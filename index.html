<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Register Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- External CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">

    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="Image/x-icon" href="./assets/images/favicon.ico">
</head>

<body>
    <div class="container-fluid cuz-container">
        <div class="main">
            <!-- Register Form -->
            <form class="form" id="registerForm">
                <div class="register-form">
                    <h2>Register Here!!</h2>
                    <div class="row">
                        <div class="col-md-6">
                            <input id="firstName" type="text" class="form-input" placeholder="First Name" required>
                        </div>
                        <div class="col-md-6">
                            <input id="lastName" type="text" class="form-input" placeholder="Last Name">
                        </div>
                    </div>
                    <input id="email" type="email" class="form-input" placeholder="EMail ID" required>
                    <input id="username" type="text" class="form-input" placeholder="Username" required>
                    <div class="row">
                        <div class="col-md-6">
                            <input id="password" type="password" class="form-input" placeholder="Password" required>
                        </div>
                        <div class="col-md-6">
                            <input id="confirmPassword" type="password" class="form-input"
                                placeholder="Confirm Password" required>
                        </div>
                    </div>
                    <div class="strength-bar">
                        <div id="strengthFill"></div>
                    </div>
                    <p id="strengthText"></p>
                    <p id="passwordError"></p>
                    <div class="password-rules">
                        <p id="lengthRule">❌ Minimum 8 characters</p>
                        <p id="upperRule">❌ One uppercase letter</p>
                        <p id="lowerRule">❌ One lowercase letter</p>
                        <p id="numberRule">❌ One number</p>
                        <p id="specialRule">❌ One special character</p>
                    </div>
                    <label class="remember-me">
                        <input type="checkbox" required>
                        I agree to the Terms &amp; Conditions
                    </label>
                    <button type="submit" class="btn cuz-btn">Register</button>
                    <div class="register-link">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </div>
                </div>
            </form>

            <!-- Carousel -->
            <div class="slider">
                <div id="imageSlider" class="carousel slide h-100" data-bs-ride="carousel" data-bs-interval="3000">
                    <div class="carousel-inner">
                        <div class="carousel-item active h-100">
                            <img src="./assets/images/image-1.jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-2.jpg" alt="Placeholder Image">
                        </div>
                        <div class="carousel-item h-100">
                            <img src="./assets/images/image-3.jpg" alt="Placeholder Image">
                        </div>
                    </div>
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="0"
                            class="active"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#imageSlider" data-bs-slide-to="2"></button>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#imageSlider"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- External JS -->
    <script src="./assets/js/script.js"></script>
    <script type="module" src="./assets/js/register.js"></script>

</body>

</html>
